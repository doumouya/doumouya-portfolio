name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # The UI imports the sibling web-kit (../../web-kit/src/...); CI doesn't get
      # it from the checkout, so clone it to the sibling path the imports resolve to.
      - name: Fetch web-kit (sibling dependency)
        run: git clone --depth 1 https://github.com/doumouya/web-kit.git ../web-kit
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck
      - name: Bundle (esbuild)
        run: npx esbuild web/app.ts --bundle --format=iife --outfile=/tmp/app.js
      - name: Scrub — no source-project identity
        run: |
          if grep -rInE 'redpash|clarna|redtable|__rp_|theme-transitioning' \
              crates README.md tools web/app.ts web/app.css web/worker.js web/index.html; then
            echo "::error::source-project identity leaked"; exit 1
          fi
          echo "scrub clean"

  engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build engine -> wasm32 (pure-compute boundary)
        run: |
          RUSTFLAGS='--cfg getrandom_backend="wasm_js"' \
            cargo build --release --target wasm32-unknown-unknown -p data
