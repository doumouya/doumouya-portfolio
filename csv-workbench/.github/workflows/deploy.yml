name: deploy

# The site (web/) is committed pre-built — the engine wasm + bundled UI — so this
# only stages and deploys it to GitHub Pages. (Rebuilding the Polars→wasm engine
# is a heavy local step; see tools/build.sh.)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      # enablement:true turns Pages on automatically via the pages:write token so
      # a fresh repo deploys without anyone toggling Settings → Pages by hand.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - id: deploy
        uses: actions/deploy-pages@v4
