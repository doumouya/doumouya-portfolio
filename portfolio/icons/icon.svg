<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Portfolio">
  <!-- Full-bleed brand background keeps the icon safe as a maskable icon. -->
  <rect width="512" height="512" fill="#2563eb"/>
  <!-- Stacked cards motif — echoes the portfolio's grid of project cards. -->
  <g transform="translate(256 256)">
    <rect x="-92" y="-66" width="200" height="150" rx="20" fill="#ffffff" opacity="0.45" transform="rotate(-9)"/>
    <rect x="-108" y="-92" width="200" height="150" rx="20" fill="#ffffff" transform="rotate(7)"/>
  </g>
</svg>
