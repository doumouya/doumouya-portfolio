<!doctype html><html lang="en" data-theme="portfolio" data-mode="light"><head><meta charset="utf-8"><script>(function(){var h=location.hostname;if(h==="doumouya-portfolio.web.app"||h==="doumouya-portfolio.firebaseapp.com"){location.replace("https://em.numu.im"+location.pathname+location.search+location.hash);}})();</script><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#0B0B0C"><script>(function(){try{var m=localStorage.getItem("amu-mode");var d=document.documentElement;d.setAttribute("data-theme","portfolio");d.setAttribute("data-mode",(m==="dark"||m==="light")?m:"light");}catch(e){}})();</script><script>(function(){try{var d=document.documentElement;["fontsize","density","motion","contrast","readfont"].forEach(function(k){var v=localStorage.getItem("amu-pref-"+k);if(v){d.setAttribute("data-"+k,v);}});}catch(e){}})();</script><link rel="canonical" href="https://em.numu.im/"><link rel="icon" href="/icons/favicon.svg"><link rel="apple-touch-icon" href="/icons/icon-192.png"><link rel="manifest" href="/manifest.webmanifest"><title>Emmanuel Doumouya — portfolio</title><style>/* base.css — the theme-platform STRUCTURE tier (AC-1). Theme-AGNOSTIC :root
   scales every theme shares: spacing, radius, the shared mono family, the type
   scale, density rhythm, motion, breakpoints, and z-index. It carries NO
   color/palette/`--font`-family/`--shadow` *value* token — those are per-theme
   (the palette tier, in src/theme/themes/<name>.css under the two-axis selector).

   This file is the structure half of the old tokens.css :root block; the palette
   half moved into the per-theme files. base.css defines no .amu-* class — it is
   theme-tier, excluded from the audit's R4 ownership exactly as tokens.css was. */

:root {
  /* spacing scale */
  --sp-1: 0.25rem;
  --sp-2: 0.5rem;
  --sp-3: 0.75rem;
  --sp-4: 1rem;
  --sp-5: 1.5rem;
  --sp-6: 2rem;
  --sp-8: 3rem;

  /* radius (px on purpose — corners don't scale with font size) */
  --radius-sm: 7px;
  --radius: 10px;
  --radius-lg: 16px;
  --radius-pill: 999px;

  /* the shared mono family (structural — data/identifiers/code). The per-theme
     display/body `--font` is a PALETTE token (per theme, e.g. mono-first for
     portfolio); `--font-mono` is shared structure and stays here. */
  --font-mono: ui-monospace, "Cascadia Code", "Segoe UI Mono", Consolas, monospace;

  /* type scale */
  --text-xs: 0.75rem;
  --text-sm: 0.8125rem;
  --text-md: 0.9375rem;
  --text-lg: 1.125rem;
  --text-xl: 1.5rem;
  --text-2xl: 2.25rem;

  /* density rhythm — the Linear-calm knob set. Components consume these;
     density attrs retune them globally (one knob, not per-sheet). */
  --row-h: 2.25rem;      /* 36px table/list rows */
  --ctl-h: 2rem;         /* 32px controls (buttons, inputs) */
  --pad-x: 0.75rem;      /* horizontal cell/control padding */
  --gap: 0.5rem;         /* default flex/grid gap */
  --topbar-h: 3.25rem;   /* 52px */
  --rail-w: 15rem;       /* 240px, fixed — no icon-only collapse */

  /* motion */
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --fast: 0.12s;
  --slow: 0.22s;

  /* z-index scale — the stacking contract (overlays above chrome above content) */
  --z-base: 0;
  --z-rail: 10;
  --z-topbar: 20;
  --z-side-panel: 30;
  --z-popover: 100;
  --z-toast: 200;
  --z-modal: 300;

  /* breakpoints — the documented source of truth. CSS can't var() inside a
     @media query, so each media rule repeats the rem literal and tags it with
     the matching token name in a comment to stay grep-synced. Floor = iPad Mini
     landscape (1024x768 = 64rem).
       --bp-lg 80rem (1280px): below, side panels overlay
       --bp-md 64rem (1024px): the FLOOR; below, the rail also drawers
       --bp-sm 48rem  (768px): portrait safety net (kept usable, not a target) */
  --bp-lg: 80rem;
  --bp-md: 64rem;
  --bp-sm: 48rem;
}
/* themes/portfolio.css — the portfolio (Console) theme (AC-9). Ports web-kit's
   "Datacore Console" identity into the amenan token contract for both modes:
   near-monochrome ink/paper, ONE green --signal, mono-first --font, a hard 1.5px
   --rule with a 4px offset block --rule-shadow, and FLAT base elevation (shadows
   only for floating layers). Values lifted from web-kit
   src/tokens/colors+charts+elevation+typography + the Console card offset block.

   web-kit keyed light off :root and dark off [data-theme="dark"]; amenan splits
   that into the two-axis [data-theme="portfolio"][data-mode="dark"|"light"].

   Token map (web-kit → amenan contract):
     ink/paper        → --bg / --text / --surface*
     --rule (ink)     → --rule (1.5px ink/paper structural line)
     --elev (ink)     → carried by --rule-shadow = 4px 4px 0 0 var(--rule)
     --accent (ink)   → --accent (primary actions are ink)
     --signal (green) → --signal / --ok / --status-progress / chart-1
     --shadow-popover/-dialog → web-kit elevation.css
     --font-sans (mono) → --font (mono-first)
     --chart-1..8     → web-kit charts.css
     --status-*       → web-kit workflow states */

/* ── dark — ink surface, paper text, green-400 signal ────────────────────── */
html[data-theme="portfolio"][data-mode="dark"] {
  --bg: #0B0B0C;                 /* --ink */
  --surface: #161618;            /* --gray-900 (surface-overlay tier) */
  --surface-2: #000000;          /* --surface-sunken */
  --border: #232327;             /* soft hairline (dividers, rows) */
  --text: #F2F2F3;
  --text-dim: #A1A1A6;           /* --gray-400 */
  --text-mute: #54545A;          /* --text-subtle (dark) */
  --accent: #F2F2F3;             /* accent = paper-ink in dark (primary actions) */
  --accent-soft: #232327;        /* --accent-tint (dark) */
  --on-accent: #0B0B0C;          /* --text-on-accent (dark) = ink */
  --ok: #34C77B;                 /* --green-400 (success in dark) */
  --warn: #B7791F;               /* --amber-500 */
  --info: #22d3ee;               /* cyan series — restrained info */
  --danger: #D63B3B;             /* --red-500 */
  --hover: color-mix(in srgb, #F2F2F3 6%, transparent);
  --glass: color-mix(in srgb, #F2F2F3 4%, transparent);
  --glass-blur: 0px;             /* Console is FLAT — no glass blur */
  --shadow: none;                /* base surfaces carry NO drop shadow */
  --ring: inset 0 0 0 1px var(--border);
  --font: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  color-scheme: dark;

  /* the Console vocabulary */
  --signal: #34C77B;             /* --green-400 */
  --signal-hover: #1E9E5A;       /* --green-500 */
  --signal-tint: color-mix(in srgb, #34C77B 16%, var(--surface));
  --rule: #F2F2F3;               /* HARD ink structural line (paper-ink in dark) */
  --rule-shadow: 4px 4px 0 0 var(--rule);  /* the Console card offset block shadow */
  --focus-ring: #34C77B;         /* --focus = green in dark */
  --chart-1: var(--signal);      /* brand green — default single series */
  --chart-2: #22d3ee;
  --chart-3: #a78bfa;
  --chart-4: #fbbf24;
  --chart-5: #f87171;
  --chart-6: #f472b6;
  --chart-7: #94a3b8;
  --chart-8: #2dd4bf;
  --status-backlog: #A1A1A6;     /* --gray-400 */
  --status-progress: #34C77B;    /* --green-400 */
  --status-review: #B7791F;      /* --amber-500 */
  --status-done: #34C77B;        /* --green-400 */
  --shadow-popover: 0 4px 12px -2px rgba(15, 23, 42, 0.12),
                    0 2px 4px -2px rgba(15, 23, 42, 0.08);
  --shadow-dialog: 0 16px 40px -8px rgba(15, 23, 42, 0.22),
                   0 4px 10px -4px rgba(15, 23, 42, 0.10);
}

/* ── light — paper surface, ink text, green-500 signal (web-kit :root) ─────── */
html[data-theme="portfolio"][data-mode="light"] {
  --bg: #FFFFFF;                 /* --paper */
  --surface: #FFFFFF;            /* --surface */
  --surface-2: #ECECEE;          /* --surface-sunken / --gray-100 */
  --border: #E0E0E3;             /* --gray-200 soft hairline */
  --text: #0B0B0C;              /* --ink */
  --text-dim: #717177;           /* --gray-500 */
  --text-mute: #A1A1A6;          /* --gray-400 */
  --accent: #0B0B0C;             /* accent = ink (primary actions) */
  --accent-soft: #ECECEE;        /* --accent-tint (--gray-100) */
  --on-accent: #FFFFFF;          /* --text-on-accent = paper */
  --ok: #1E9E5A;                 /* --green-500 (success in light) */
  --warn: #B7791F;               /* --amber-500 */
  --info: #0891b2;               /* cyan-600 — restrained info */
  --danger: #D63B3B;             /* --red-500 */
  --hover: color-mix(in srgb, #0B0B0C 4%, transparent);
  --glass: color-mix(in srgb, #FFFFFF 80%, transparent);
  --glass-blur: 0px;             /* Console is FLAT — no glass blur */
  --shadow: none;                /* base surfaces carry NO drop shadow */
  --ring: inset 0 0 0 1px var(--border);
  --font: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  color-scheme: light;

  /* the Console vocabulary */
  --signal: #1E9E5A;             /* --green-500 */
  --signal-hover: #16864B;       /* --green-600 */
  --signal-tint: color-mix(in srgb, #1E9E5A 12%, var(--surface));
  --rule: #0B0B0C;               /* HARD ink structural line */
  --rule-shadow: 4px 4px 0 0 var(--rule);  /* the Console card offset block shadow */
  --focus-ring: #1E9E5A;         /* --focus = green */
  --chart-1: var(--signal);      /* brand green — default single series */
  --chart-2: #0891b2;            /* cyan-600 */
  --chart-3: #7c3aed;            /* violet-600 */
  --chart-4: #B7791F;            /* amber */
  --chart-5: #dc2626;            /* red-600 */
  --chart-6: #db2777;            /* pink-600 */
  --chart-7: #475569;            /* slate-600 */
  --chart-8: #0e7490;            /* teal-700 */
  --status-backlog: #717177;     /* --gray-500 */
  --status-progress: #1E9E5A;    /* --signal */
  --status-review: #B7791F;      /* --amber-500 */
  --status-done: #1E9E5A;        /* --green-500 */
  --shadow-popover: 0 4px 12px -2px rgba(15, 23, 42, 0.12),
                    0 2px 4px -2px rgba(15, 23, 42, 0.08);
  --shadow-dialog: 0 16px 40px -8px rgba(15, 23, 42, 0.22),
                   0 4px 10px -4px rgba(15, 23, 42, 0.10);
}
/* atoms — the lowest-level vocabulary: button, chip, input, textarea, badge,
   spinner, kbd. Sole owner of these classes (ui-fork-audit R4).
   knob: --atom-radius */

/* ── amu-btn ── the text button. Variants: default · accent (ONE per view —
   the primary action) · ghost (low-emphasis). */
.amu-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: calc(var(--gap) * 0.75);
  height: var(--ctl-h);
  padding: 0 var(--pad-x);
  border: 1px solid var(--border);
  border-radius: var(--atom-radius, var(--radius));
  background: var(--surface);
  color: var(--text);
  font-size: var(--text-sm);
  font-weight: 500;
  cursor: pointer;
  transition: background var(--fast) var(--ease), border-color var(--fast) var(--ease);
  user-select: none;
  white-space: nowrap;
}
.amu-btn:hover {
  background: var(--hover);
}
.amu-btn:disabled {
  opacity: 0.45;
  cursor: default;
}
.amu-btn--accent {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--on-accent);
  font-weight: 600;
}
.amu-btn--accent:hover {
  background: var(--accent);
  filter: brightness(1.08);
}
.amu-btn--ghost {
  border-color: transparent;
  background: transparent;
  color: var(--text-dim);
}
.amu-btn--ghost:hover {
  background: var(--hover);
  color: var(--text);
}
.amu-btn--danger {
  color: var(--danger);
}
.amu-btn--sm {
  height: 1.625rem;
  padding: 0 var(--sp-2);
  font-size: var(--text-xs);
}
/* icon-only: square, no horizontal padding; the bi glyph centers via the
   flex alignment already on .amu-btn. */
.amu-btn--icon {
  width: var(--ctl-h);
  padding: 0;
  font-size: var(--text-md);
}

/* ── amu-chip ── pill selector (single-select rows live in chip-row). */
.amu-chip {
  display: inline-flex;
  align-items: center;
  height: 1.625rem;
  padding: 0 var(--sp-3);
  border: 1px solid transparent;
  border-radius: var(--radius-pill);
  background: transparent;
  color: var(--text-dim);
  font-size: var(--text-sm);
  cursor: pointer;
  transition: background var(--fast) var(--ease), color var(--fast) var(--ease);
  white-space: nowrap;
}
.amu-chip:hover {
  color: var(--text);
}
.amu-chip.is-active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--ring), var(--shadow);
}

/* ── amu-input ── single-line text input. */
.amu-input {
  height: var(--ctl-h);
  padding: 0 var(--pad-x);
  border: 1px solid var(--border);
  border-radius: var(--atom-radius, var(--radius));
  background: var(--bg);
  color: var(--text);
  font-size: var(--text-sm);
  width: 100%;
}
.amu-input::placeholder {
  color: var(--text-mute);
}
.amu-input:focus {
  outline: 2px solid var(--focus-ring);
  outline-offset: -1px;
  border-color: var(--accent);
}

/* ── amu-textarea ── the multiline input (comment composers, descriptions). */
.amu-textarea {
  display: block;
  width: 100%;
  min-height: 4.5rem;
  padding: 0.5rem var(--pad-x);
  border: 1px solid var(--border);
  border-radius: var(--atom-radius, var(--radius));
  background: var(--bg);
  color: var(--text);
  font: inherit;
  font-size: var(--text-sm);
  line-height: 1.5;
  resize: vertical;
}
.amu-textarea::placeholder {
  color: var(--text-mute);
}
.amu-textarea:focus {
  outline: 2px solid var(--focus-ring);
  outline-offset: -1px;
  border-color: var(--accent);
}

/* ── amu-badge ── soft-tint label pill (status / role / plan). */
.amu-badge {
  display: inline-flex;
  align-items: center;
  height: 1.25rem;
  padding: 0 var(--sp-2);
  border-radius: var(--radius-pill);
  background: var(--surface-2);
  color: var(--text-dim);
  font-size: var(--text-xs);
  font-weight: 500;
  white-space: nowrap;
}
.amu-badge--ok { background: var(--signal-tint); color: var(--signal); }
.amu-badge--warn { background: color-mix(in srgb, var(--warn) 14%, transparent); color: var(--warn); }
.amu-badge--danger { background: color-mix(in srgb, var(--danger) 14%, transparent); color: var(--danger); }
.amu-badge--info { background: color-mix(in srgb, var(--info) 14%, transparent); color: var(--info); }
.amu-badge--accent { background: var(--accent-soft); color: var(--accent); }

/* ── amu-spinner ── async feedback (used sparingly — optimistic UI first). */
.amu-spinner {
  display: inline-block;
  width: 1rem;
  height: 1rem;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: amu-spin 0.7s linear infinite;
}
@keyframes amu-spin {
  to { transform: rotate(360deg); }
}

/* ── amu-kbd ── keyboard hint. */
.amu-kbd {
  display: inline-block;
  padding: 0.0625rem 0.375rem;
  border: 1px solid var(--border);
  border-bottom-width: 2px;
  border-radius: var(--radius-sm);
  background: var(--surface);
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--text-dim);
}
/* card — lifted content tile (launcher tiles, glanceables). One of the two
   sanctioned glass surfaces (topbar is the other). Sole owner of .amu-card*. */

.amu-card {
  display: block;
  padding: var(--sp-4);
  background: var(--glass);
  backdrop-filter: blur(var(--glass-blur));
  border: 1.5px solid var(--rule);
  border-radius: var(--radius-lg);
  /* the structural identity surface: portfolio gets the Console offset block
     (--rule-shadow = 4px 4px 0 ink); redpash keeps its soft shadow. */
  box-shadow: var(--rule-shadow);
  color: var(--text);
  text-align: left;
  transition: background var(--fast) var(--ease);
}

a.amu-card:hover,
button.amu-card:hover {
  background: var(--hover);
  text-decoration: none;
  cursor: pointer;
}

.amu-card-title {
  margin: 0 0 var(--sp-1);
  font-size: var(--text-md);
  font-weight: 600;
}

.amu-card-sub {
  margin: 0;
  font-size: var(--text-sm);
  color: var(--text-dim);
}
/* termbar — the Console top strip (AC-17). Sole owner of every .amu-termbar*
   class (ui-fork-audit R4). Ported from web-kit's termbar CSS to amenan token
   names: the hard structural line is --rule, the status pill is the one-green
   --signal, mono type via --font-mono, muted secondary text via --text-mute. */

.amu-termbar {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  padding: var(--sp-3) var(--sp-5);
  border-bottom: 1.5px solid var(--rule);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: var(--text-xs);
}

.amu-termbar-dot {
  width: 0.5625rem;
  height: 0.5625rem;
  border-radius: var(--radius-pill);
  border: 1.5px solid var(--rule);
}

.amu-termbar-name {
  font-weight: 700;
  margin-left: var(--sp-2);
}

.amu-termbar-cwd {
  color: var(--text-mute);
}

.amu-termbar-status {
  color: var(--signal);
  font-weight: 700;
}

.amu-termbar-toggle {
  margin-left: auto;
  appearance: none;
  background: none;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--text-mute);
  border: 1.5px solid var(--rule);
  border-radius: var(--radius-sm);
  padding: var(--sp-1) var(--sp-3);
  line-height: 1.4;
  transition:
    color var(--fast) var(--ease),
    background-color var(--fast) var(--ease);
}

.amu-termbar-toggle:hover {
  color: var(--text);
  background: var(--signal-tint);
}
/* markdown — display styles for rendered Markdown (.amu-md). Sole owner of
   .amu-md (ui-fork-audit R4); the descendant rules style the safe element subset
   the renderer emits (p · strong · em · code · pre · a · ul/ol/li · blockquote).
   Relative units; 1px hairlines only. */

.amu-md {
  font-size: var(--text-sm);
  line-height: 1.5;
  word-break: break-word;
}
.amu-md > :first-child { margin-top: 0; }
.amu-md > :last-child { margin-bottom: 0; }

.amu-md p { margin: 0 0 var(--sp-2); }

.amu-md a { color: var(--accent); text-decoration: underline; }

.amu-md code {
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 0.9em;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--atom-radius, var(--radius));
  padding: 0.05em 0.3em;
}
.amu-md pre {
  margin: 0 0 var(--sp-2);
  padding: var(--sp-2);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow-x: auto;
}
.amu-md pre code { background: none; border: none; padding: 0; font-size: 0.85em; }

.amu-md blockquote {
  margin: 0 0 var(--sp-2);
  padding-left: var(--sp-3);
  border-left: 2px solid var(--border);
  color: var(--text-mute);
}

.amu-md ul, .amu-md ol { margin: 0 0 var(--sp-2); padding-left: 1.4rem; }
.amu-md li { margin: 0.1rem 0; }
/* modal — create/confirm ONLY (the minimalism rule). Sole owner of .amu-modal*. */

.amu-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  display: grid;
  place-items: center;
  z-index: 100;
}

.amu-modal {
  width: min(26rem, 92vw);
  max-height: 85vh;
  overflow: auto;
  background: var(--surface);
  border: 1.5px solid var(--rule);
  border-radius: var(--radius-lg);
  /* dialog elevation token: portfolio's flat dialog shadow, redpash's soft one. */
  box-shadow: var(--shadow-dialog);
  padding: var(--sp-5);
}

.amu-modal-title {
  margin: 0 0 var(--sp-4);
  font-size: var(--text-lg);
  font-weight: 600;
}

.amu-modal-body {
  margin-bottom: var(--sp-5);
}

.amu-modal-foot {
  display: flex;
  justify-content: flex-end;
  gap: var(--gap);
}
/* redtable — THE data table (one implementation; virtual + pager modes are
   config, never forks; interaction modes — select/edit/delete — are state
   classes on the root). Calm density via the rhythm tokens. Sole owner of
   .amu-redtable*.
   knobs: --redtable-max-h */

.amu-redtable {
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--ring);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  /* Let the table FILL a flex-column parent (e.g. a `fill` surface section):
     flex:1 grows it to the remaining height, min-height:0 lets the scroll
     shrink below its content. Both inert in a block parent — pager/virtual
     modes outside a sized flex column are unaffected (the scroll's max-height
     still caps a free-standing table; lift it via --redtable-max-h). */
  flex: 1;
  min-height: 0;
}

.amu-redtable-scroll {
  flex: 1;
  overflow: auto;
  max-height: var(--redtable-max-h, 60vh);
}

.amu-redtable table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--text-sm);
}

.amu-redtable th {
  position: sticky;
  top: 0;
  z-index: 2;
  background: var(--surface-2);
  text-align: left;
  font-weight: 500;
  color: var(--text-dim);
  height: var(--row-h);
  padding: 0 var(--pad-x);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}

/* sortable header — click cycles the server sort; the chevron shows the active
   column + direction. The sorted column reads in the accent. */
.amu-redtable th.amu-redtable-th-sort {
  cursor: pointer;
  user-select: none;
}
.amu-redtable th.amu-redtable-th-sort:hover { color: var(--text); }
.amu-redtable th.amu-redtable-th-sort.is-sorted { color: var(--accent); }
.amu-redtable-sort {
  margin-left: 0.25rem;
  font-size: 0.85em;
  opacity: 0.5;
}
.amu-redtable th.amu-redtable-th-sort:hover .amu-redtable-sort,
.amu-redtable th.amu-redtable-th-sort.is-sorted .amu-redtable-sort { opacity: 1; }

/* row-number column — a narrow, muted leading "#" column (1-based view
   position). Tabular figures so digits don't jitter the edge on scroll. */
.amu-redtable-rownum {
  width: 3rem;
  min-width: 3rem;
  text-align: right;
  color: var(--text-mute);
  font-variant-numeric: tabular-nums;
  font-size: var(--text-sm);
}

.amu-redtable td {
  height: var(--row-h);
  padding: 0 var(--pad-x);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 20rem;
}

.amu-redtable tbody tr:hover td {
  background: var(--hover);
}

.amu-redtable tbody tr.is-selected td {
  background: var(--accent-soft);
}

.amu-redtable td.amu-redtable-num {
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.amu-redtable-null {
  color: var(--text-mute);
  font-style: italic;
}

.amu-redtable-foot {
  border-top: 1px solid var(--border);
  padding: var(--sp-1) var(--pad-x);
}

/* ── interaction modes — state classes on the root (select / edit / delete).
   The LAYOUT (pager/virtual) is orthogonal; these only retune what a cell or
   row looks/behaves like. ─────────────────────────────────────────────── */

/* select — a leading checkbox column (head select-all + per-row). The cell is
   tight and centered; the box sizes off the text rhythm. */
.amu-redtable-check-cell {
  width: var(--row-h);
  padding: 0 var(--pad-x);
  text-align: center;
}
.amu-redtable-check {
  width: 0.9375rem;
  height: 0.9375rem;
  margin: 0;
  accent-color: var(--accent);
  cursor: pointer;
  vertical-align: middle;
}
/* the whole row is a click target in select mode (the row handler toggles). */
.amu-redtable.is-select tbody tr {
  cursor: pointer;
}

/* edit — cells read as editable (a subtle pointer); the cell holding an active
   editor gets an accent inset so the focus is unmistakable. */
.amu-redtable.is-edit tbody td {
  cursor: text;
}
/* the editor input fills the cell flush — no double border, the inset is the
   table's, not the atom's. (The atom's .amu-input supplies the base skin; this
   only retunes — atoms.css remains the sole owner of .amu-input, R4.) */
.amu-redtable-editor {
  height: calc(var(--row-h) - 0.5rem);
  border-color: var(--accent);
  box-shadow: inset 0 0 0 1px var(--accent);
  background: var(--surface);
}

/* delete — row click removes; the hover reads destructive (danger tint + a
   left danger bar) so the consequence is legible before the click. */
.amu-redtable.is-delete tbody tr {
  cursor: pointer;
}
.amu-redtable.is-delete tbody tr:hover td {
  background: color-mix(in srgb, var(--danger) 12%, transparent);
  color: var(--danger);
}
.amu-redtable.is-delete tbody tr:hover td:first-child {
  box-shadow: inset 0.1875rem 0 0 0 var(--danger);
}
/* pager — rows info + page controls. Sole owner of .amu-pager*. */

.amu-pager {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--gap);
  font-size: var(--text-sm);
  color: var(--text-dim);
}
/* at the 1024 floor, wrap rather than overflow when space is tight. */
@media (max-width: 64rem) { /* --bp-md */
  .amu-pager { flex-wrap: wrap; row-gap: var(--sp-2); }
}

.amu-pager-pages {
  display: inline-flex;
  gap: 0.125rem;
}

.amu-pager-btn {
  min-width: 1.75rem;
  height: 1.75rem;
  padding: 0 0.375rem;
  border: 0;
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-dim);
  font-size: var(--text-sm);
  cursor: pointer;
}
.amu-pager-btn:hover {
  background: var(--hover);
  color: var(--text);
}
.amu-pager-btn.is-active {
  background: var(--accent-soft);
  color: var(--text);
  font-weight: 600;
}
.amu-pager-btn:disabled {
  opacity: 0.4;
  cursor: default;
}
/* empty-state — THE onboarding surface: one sentence + the view's single
   primary action. No tours, no hint chips. Sole owner of .amu-empty*. */

.amu-empty {
  display: grid;
  place-items: center;
  text-align: center;
  padding: var(--sp-8) var(--sp-5);
  gap: var(--sp-2);
}

.amu-empty-title {
  margin: 0;
  font-size: var(--text-lg);
  font-weight: 600;
}

.amu-empty-line {
  margin: 0 0 var(--sp-3);
  color: var(--text-dim);
  font-size: var(--text-sm);
  max-width: 26rem;
}
/* filter-panel — the FilterNode builder. Sole owner of .amu-fp*. Compact, calm
   (Linear density); designed for a ~280px side panel. */

.amu-fp {
  display: flex;
  flex-direction: column;
  gap: var(--sp-3);
  font-size: var(--text-sm);
}

/* combinator (All / Any) — only shown when >1 row */
.amu-fp-combo {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
}

.amu-fp-combo:empty {
  display: none;
}

.amu-fp-combo-label {
  color: var(--text-mute);
  font-size: var(--text-xs);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.amu-fp-seg {
  display: inline-flex;
  border-radius: var(--radius-sm);
  box-shadow: var(--ring);
  overflow: hidden;
}

.amu-fp-seg-btn {
  padding: 0.1875rem var(--sp-3);
  border: 0;
  background: var(--surface);
  color: var(--text-dim);
  font-size: var(--text-xs);
  cursor: pointer;
}

.amu-fp-seg-btn + .amu-fp-seg-btn {
  border-left: 1px solid var(--border);
}

.amu-fp-seg-btn.is-active {
  background: var(--accent-soft);
  color: var(--accent);
  font-weight: 600;
}

/* the rows list */
.amu-fp-rows {
  display: flex;
  flex-direction: column;
  gap: var(--sp-2);
}

.amu-fp-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: var(--sp-2);
  align-items: center;
  padding: var(--sp-2);
  background: var(--surface);
  border-radius: var(--radius-sm);
  box-shadow: var(--ring);
}

/* column + op stack full width on the left; value spans the row below; remove
   hugs the top-right — keeps the row legible at 280px without horizontal scroll */
.amu-fp-col,
.amu-fp-op,
.amu-fp-value {
  grid-column: 1;
  min-width: 0;
}

/* the column/op selects own their width (.amu-select min-width) — we don't style
   another component's class (ui-fork-audit R4). The select host is a block so
   each control sits on its own line, comfortable at ~280px. */
.amu-fp-col,
.amu-fp-op {
  display: block;
}

.amu-fp-remove {
  grid-column: 2;
  grid-row: 1;
  align-self: start;
}

.amu-fp-value {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
}

.amu-fp-value:empty {
  display: none;
}

.amu-fp-text {
  width: 100%;
}

.amu-fp-num {
  width: 100%;
  min-width: 0;
}

.amu-fp-and {
  color: var(--text-mute);
  font-size: var(--text-xs);
  flex: 0 0 auto;
}

/* a nested AND/OR group — recessed surface + hairline so the tree reads at a
   glance; its head carries the group's own All/Any toggle + a remove. */
.amu-fp-group {
  display: flex;
  flex-direction: column;
  gap: var(--sp-2);
  padding: var(--sp-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface-2);
}

.amu-fp-group-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--sp-2);
}

.amu-fp-add {
  display: flex;
  flex-wrap: wrap;
  gap: var(--sp-2);
}

.amu-fp-foot {
  display: flex;
  justify-content: flex-end;
  gap: var(--sp-2);
  padding-top: var(--sp-2);
  border-top: 1px solid var(--border);
}
/* select — native select, token-skinned (less is more: no custom listbox
   until a real need arrives). Sole owner of .amu-select. */

.amu-select {
  height: var(--ctl-h);
  padding: 0 var(--pad-x);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  color: var(--text);
  font-size: var(--text-sm);
  cursor: pointer;
  min-width: 9rem;
}

.amu-select:focus {
  outline: 2px solid var(--focus-ring);
  outline-offset: -1px;
  border-color: var(--accent);
}
/* omni — the global omnisearch: a pill box + a results dropdown. Sole owner of
   every .amu-omni* class (ui-fork-audit R4). Calm chrome (no glass); results come
   from the injected source and each carries a ready destination the consumer
   routes to. */

.amu-omni {
  position: relative; /* anchors the results menu */
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  /* fluid but never collapses past a usable width */
  width: clamp(16rem, 42vw, 34rem);
  height: 2.25rem;
  padding: 0 0.75rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-pill);
  background: var(--surface);
  transition: border-color var(--fast) var(--ease), box-shadow var(--fast) var(--ease);
}
.amu-omni:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 0.1875rem var(--accent-soft);
}
.amu-omni > .bi { font-size: 0.875rem; color: var(--text-mute); flex-shrink: 0; }
.amu-omni input {
  flex: 1;
  min-width: 0;
  border: 0;
  outline: 0;
  background: transparent;
  color: var(--text);
  font: inherit;
  font-size: var(--text-sm);
}
.amu-omni input::placeholder { color: var(--text-mute); }

/* ── results dropdown — anchored below the box, scrolls on overflow ─────────── */
.amu-omni-menu {
  position: absolute;
  top: calc(100% + 0.375rem);
  left: 0;
  right: 0;
  max-height: 22.5rem;
  overflow-y: auto;
  padding: 0.25rem 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  z-index: 60;
}
.amu-omni-menu[hidden] { display: none; }

.amu-omni-section {
  padding: 0.5rem 0.875rem 0.25rem;
  font-size: var(--text-xs);
  font-weight: 650;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--text-mute);
}
.amu-omni-section:not(:first-child) {
  border-top: 1px solid var(--border);
  margin-top: 0.25rem;
}

.amu-omni-result {
  width: 100%;
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  padding: 0.4375rem 0.875rem;
  border: 0;
  background: transparent;
  font: inherit;
  font-size: var(--text-sm);
  color: var(--text);
  text-align: left;
  cursor: pointer;
  transition: background var(--fast) var(--ease);
}
.amu-omni-result > .bi { color: var(--text-mute); font-size: 0.875rem; flex-shrink: 0; }
.amu-omni-result:hover,
.amu-omni-result.is-active { background: var(--accent-soft); }
.amu-omni-result.is-active > .bi { color: var(--accent); }
.amu-omni-result-label {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.amu-omni-result-sub {
  flex-shrink: 0;
  max-width: 40%;
  font-size: var(--text-xs);
  color: var(--text-mute);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.amu-omni-hl {
  background: color-mix(in srgb, var(--info) 22%, transparent);
  color: var(--info);
  font-weight: 600;
  border-radius: 0.1875rem;
  padding: 0 0.125rem;
}
.amu-omni-state {
  padding: 0.75rem 0.875rem;
  font-size: var(--text-sm);
  color: var(--text-mute);
  text-align: center;
}

/* portrait safety net — let the box shrink so it fits beside the icons. */
@media (max-width: 48rem) { /* --bp-sm */
  .amu-omni { width: clamp(10rem, 60vw, 20rem); }
}
/* chart — the ECharts-backed chart tile. Sole owner of the .amu-chart-* classes.
   Glass surface; tokens mapped to amenan (--glass-blur, --border). */

/* Auto-fit grid of 1-N chart cards (a chart strip). */
.amu-charts {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(16.25rem, 1fr));
  gap: var(--sp-3);
  margin-bottom: var(--sp-6);
}

/* The chart tile container — glass surface, flex column (title + canvas). */
.amu-chart-card {
  display: flex;
  flex-direction: column;
  padding: var(--sp-3) var(--sp-3) var(--sp-2);
  background: var(--glass);
  -webkit-backdrop-filter: blur(var(--glass-blur));
  backdrop-filter: blur(var(--glass-blur));
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

/* Small uppercase tile title — owned by chart (not a second class on an atom). */
.amu-chart-title {
  font-size: 0.6875rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--text-mute);
  margin-bottom: var(--sp-2);
}

/* The ECharts mount slot — load-bearing height (an unsized canvas renders a
   0px-tall chart); full width; flex:1. */
.amu-chart-canvas {
  flex: 1;
  width: 100%;
  height: 11.25rem;
  min-height: 11.25rem;
}

/* Faded dashed placeholder for an empty/echarts-less slot — a muted em-dash. */
.amu-chart-card--empty {
  background: var(--glass);
  border: 1px dashed var(--border);
  opacity: 0.45;
}
.amu-chart-card--empty .amu-chart-canvas {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-mute);
  font-size: 0.6875rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.amu-chart-card--empty .amu-chart-canvas::after {
  content: "\2014";
}
/* dashboard-grid — the designer canvas. Sole owner of .amu-dg-*. A cols×rows CSS
   grid at 3:2 aspect (15×10 → square cells); elements are placed by the JS via
   grid-column/grid-row. Editable mode shows a faint cell backdrop + per-cell
   move/resize chrome. */

.amu-dg {
  display: grid;
  grid-template-columns: repeat(var(--dg-cols, 15), 1fr);
  grid-template-rows: repeat(var(--dg-rows, 10), 1fr);
  gap: var(--sp-2);
  width: 100%;
  aspect-ratio: 3 / 2;          /* 15 : 10 → square cells */
  max-height: 80vh;
}

/* Editable: a faint cell-grid backdrop so placement reads clearly. */
.amu-dg.is-editable {
  background-image:
    linear-gradient(to right, var(--border) 1px, transparent 1px),
    linear-gradient(to bottom, var(--border) 1px, transparent 1px);
  background-size: calc(100% / var(--dg-cols, 15)) calc(100% / var(--dg-rows, 10));
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1px;
}

.amu-dg-cell {
  position: relative;
  min-width: 0;
  min-height: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
}

.amu-dg-cell-body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

/* Edit chrome — a slim top bar (grip + remove) revealed on hover, + an SE
   resize handle. */
.amu-dg-cell-bar {
  position: absolute;
  inset: 0 0 auto 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: var(--sp-5);
  padding: 0 var(--sp-2);
  background: var(--glass);
  -webkit-backdrop-filter: blur(var(--glass-blur));
  backdrop-filter: blur(var(--glass-blur));
  opacity: 0;
  transition: opacity 0.12s;
}
.amu-dg-cell:hover .amu-dg-cell-bar,
.amu-dg-cell.is-dragging .amu-dg-cell-bar { opacity: 1; }

.amu-dg-grip {
  flex: 1;
  height: 100%;
  cursor: move;
  display: flex;
  align-items: center;
}
.amu-dg-grip::before {
  content: "\22EE\22EE";        /* ⋮⋮ */
  color: var(--text-mute);
  font-size: 0.75rem;
  letter-spacing: -0.15em;
}

.amu-dg-del {
  border: 0;
  background: transparent;
  color: var(--text-mute);
  font-size: 1rem;
  line-height: 1;
  cursor: pointer;
  padding: 0 var(--sp-1);
}
.amu-dg-del:hover { color: var(--danger, #e5484d); }

.amu-dg-resize {
  position: absolute;
  right: 0;
  bottom: 0;
  width: var(--sp-4);
  height: var(--sp-4);
  cursor: se-resize;
  opacity: 0;
}
.amu-dg-cell:hover .amu-dg-resize { opacity: 1; }
.amu-dg-resize::after {
  content: "";
  position: absolute;
  right: 0.2rem;
  bottom: 0.2rem;
  width: 0.5rem;
  height: 0.5rem;
  border-right: 2px solid var(--text-mute);
  border-bottom: 2px solid var(--text-mute);
}

.amu-dg-cell.is-dragging,
.amu-dg-cell.is-resizing {
  outline: 2px solid var(--accent, #6366f1);
  z-index: 2;
}
/* Front-door page chrome — authored on amenan-ui's token contract. The portfolio
   (Console) theme is selected on <html data-theme="portfolio"> and supplies every
   value (ink/paper, the one green --signal, the hard 1.5px --rule, the mono --font).
   Cards, buttons, the badge, and the termbar wear amenan-ui's OWN component CSS
   (inlined at build); this sheet styles only the SPA frame the framework doesn't
   ship: the sticky chrome (termbar + nav), the routes, the hero, the project grid,
   the writing/about/contact prose, and the in-site demo frame. */

:root {
  --container: 64rem;
}

body {
  margin: 0;
  font-family: var(--font); /* portfolio --font = mono-first Console */
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}
a {
  color: var(--accent);
}

/* inline-SVG icons — inherit ink via currentColor, sized in em so they scale with
   the text-size preference. Buttons already provide the icon↔label gap. */
.icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex: none;
}
.icon svg {
  width: 1.15em;
  height: 1.15em;
  display: block;
}
.amu-btn .icon svg {
  width: 1.05em;
  height: 1.05em;
}

/* ── the persistent shell: termbar + nav, sticky as one header ────────────── */
.chrome {
  position: sticky;
  top: 0;
  z-index: var(--z-topbar);
  background: var(--bg);
  border-bottom: 1.5px solid var(--rule);
}
#termbar {
  display: block;
}
.nav {
  border-top: 1.5px solid var(--rule);
}
.nav-inner {
  max-width: var(--container);
  margin: 0 auto;
  display: flex;
  gap: var(--sp-1);
  padding: var(--sp-2) var(--sp-4);
  flex-wrap: wrap;
}
.nav-link {
  display: inline-flex;
  align-items: center;
  gap: var(--sp-2);
  text-decoration: none;
  color: var(--text-dim);
  font-size: var(--text-sm);
  padding: var(--sp-1) var(--sp-3);
  border-radius: var(--radius-sm);
  border: 1.5px solid transparent;
  line-height: 1.6;
}
.nav-link .icon {
  color: var(--text-mute);
}
.nav-link:hover {
  color: var(--text);
  background: var(--surface, transparent);
}
.nav-link[aria-current="page"] {
  color: var(--text);
  border-color: var(--rule);
}
.nav-link[aria-current="page"] .icon {
  color: var(--signal);
}

/* ── routes: a max-width column, except the full-bleed demo frame ─────────── */
.app {
  display: block;
}
.route {
  max-width: var(--container);
  margin: 0 auto;
  padding: var(--sp-6) var(--sp-6) var(--sp-8);
}
.route.demo {
  max-width: none;
  padding: 0;
}

.page-head {
  margin: 0 0 var(--sp-5);
}
.page-head h1 {
  margin: 0;
  font-size: var(--text-xl);
  letter-spacing: -0.02em;
}
.page-head .sub {
  margin: var(--sp-3) 0 0;
  color: var(--text-dim);
  font-size: var(--text-md);
  max-width: 42rem;
}

/* ── hero ─────────────────────────────────────────────────────────────────*/
.hero {
  padding: clamp(1.5rem, 5vw, 3.5rem) 0 var(--sp-6);
}
.hero h1 {
  margin: 0;
  font-size: var(--text-2xl);
  font-weight: 700;
  letter-spacing: -0.02em;
}
.hero .sub {
  margin: var(--sp-4) 0 0;
  color: var(--text-dim);
  font-size: var(--text-lg);
  line-height: 1.5;
  max-width: 44rem;
}
.hero .note {
  margin: var(--sp-4) 0 0;
  color: var(--text-mute);
  font-size: var(--text-sm);
  max-width: 44rem;
}
.cta {
  display: flex;

var IMMUNE_SYSTEM_MD = "# The immune system\n\n### Building a vanilla-JS SPA without a framework \u2014 and the gates that kept it honest\n\nI didn't skip React out of purism. I skipped it, then spent six weeks learning *exactly what it would have\nenforced* \u2014 by getting burned by the absence of it, and rebuilding that enforcement as machine checks.\n\n## The hard way\n\nRedPash is one idea \u2014 a browser-first data-quality tool where the data never leaves the device \u2014 rebuilt from the\nground up **six times in about six weeks**: Streamlit \u2192 Django \u2192 three vanilla front-end sandboxes \u2192 a Rust /\nWebAssembly PWA. Each rewrite was a response to a real ceiling the last one hit. The Streamlit and Django versions\nwere quick but monolithic: every object type hard-coded, nothing could grow. The front-end sandboxes taught the\nexpensive lesson \u2014 **uncontrolled component forking produced 137 same-class CSS divergences.** Two components quietly\nstyling the same class, drift nobody noticed until the UI stopped agreeing with itself.\n\nOn a solo project directed through a fleet of AI agents committing to one branch, nobody reads every diff. So the\ndefenses had to be **encoded, not remembered**: a static check fails the *tool*, not the person who forgot.\n\n## The immune system\n\nTwo layers. A small from-scratch **component framework** \u2014 self-registering components with single-ownership of\ntheir styles, three registries that make UI components, object types, and behaviour all *data*, and one token system\nevery surface reads from. And a **ratcheted audit suite**: ~25\u201328 static analyzers, one per slice of the codebase\n(the CSS families, the JS\u2194Rust seam, the Rust structure, RBAC/auth, privacy, the docs spine), auto-discovered and\nrun on every commit.\n\nThe clever part is the **ratchet**. Each analyzer counts violations and compares to a committed baseline; CI fails\nonly when a count climbs *above* it. **Green means no _new_ drift \u2014 not zero findings.** The large backlog of honest,\npre-existing debt sits in the baseline so it never blocks, but it can only ever go down. A few that earned their\nplace:\n\n- **`ui-fork-audit`** \u2014 the 137-divergence lesson, turned into a CI failure. Forking a framework style is now\n  mechanically forbidden; one class has one owner, by gate.\n- **`purity-check`** \u2014 the `data` crate must compile to `wasm32` with zero IO, threads, HTTP, or clock. That purity\n  is *what makes* \"one engine, two surfaces\" possible \u2014 the same compute runs byte-identical on the server and in the\n  browser \u2014 and it's held by a machine, not by vigilance.\n- **`capability-audit`** \u2014 an anti-amnesia gate: it diffs the live capability manifest against a committed ledger and\n  fails CI on anything silently dropped during a rebuild.\n- **atomic-docs** \u2014 every code change updates its own documentation in the same commit, or the gate fails.\n\nVersion-controlled git hooks run the same gate locally before a push leaves the machine. And the same gates fence\n*every* agent \u2014 including a local open-weight model wired in alongside Claude, with the foundation hard-denied to it.\nThe discipline lives at git, not in any one prompt.\n\n## Honesty as a feature\n\nThe baseline doubles as an honest ledger of what *isn't* done \u2014 at last read it openly tracked 82 UI-doc gaps, 23\nlist-endpoints still needing RBAC coverage, 19 framework-reuse violations, 17 observability gaps. A system that\ncounts its own debt in CI and refuses to let it grow is telling you the truth about itself. The same instinct, turned\non privacy: an internal Privacy-by-Design audit produced 12 GDPR-mapped findings, which I then **encoded as another\nanalyzer** \u2014 privacy stopped being asserted in a document and became a number the build won't let regress. The\nenforced count fell 11 \u2192 2; the two remainders are a documented pre-launch workstream, not quietly dropped.\n\n## What it taught me\n\nThe transferable skill isn't \"frameworkless JS.\" It's **measure, don't assert** \u2014 take a fuzzy quality nobody has\nquantified (consistency, privacy, \"the design system is intact\") and turn it into a gate that holds the line as the\nsystem changes. That's the same loop whether the subject is CSS drift or an LLM evaluation harness.\n\nIt also taught me where the manual discipline was load-bearing: I reached for **TypeScript** on my next project,\nbecause a type-aware language gives you a chunk of this enforcement for free. But the lesson stands on its own \u2014 the\nframework and its gates were strong enough to carry a real single-page app in vanilla JS, no React, no Vue, without\nthe UI eroding under a fleet of agents.\n\n---\n\n*Honest framing: RedPash is a pre-production, solo, six-week build \u2014 localhost, n=1, no real users. The asset here\nisn't scale; it's the methodology, and the fact that I came to it by getting it wrong first. Full story and the\npublic repos: [redpash-deep-dive](https://github.com/doumouya/redpash-rust-pwa/blob/main/docs/redpash-deep-dive.md) \xB7\n[github.com/doumouya](https://github.com/doumouya).*\n";

function renderPost(md) {
  const art = el("article", { class: "post" });
  const isHeading = (l) => /^#{1,6}\s/.test(l);
  const isHr = (l) => /^---+\s*$/.test(l);
  const isFence = (l) => /^```/.test(l);
  const isListStart = (l) => /^\s*([-*]|\d+\.)\s+/.test(l);
  const blank = (l) => l.trim() === "";
  const src = md.replace(/\r\n/g, "\n").split("\n");
  const lines = [];
  for (const line of src) {
    const prev = lines[lines.length - 1];
    const cont = !blank(line) && !isHeading(line) && !isHr(line) && !isFence(line) && !isListStart(line);
    const joinable = prev !== void 0 && !blank(prev) && !isHeading(prev) && !isHr(prev) && !isFence(prev);
    if (cont && joinable) lines[lines.length - 1] = `${prev} ${line.trim()}`;
    else lines.push(line);
  }
  let buf = [];
  const flush = () => {
    const block = buf.join("\n").trim();
    buf = [];
    if (block) art.appendChild(renderMarkdown(block));
  };
  for (const line of lines) {
    if (isHeading(line)) {
      flush();
      const h = /^(#{1,6})\s+(.*)$/.exec(line);
      const level = Math.min((h?.[1] ?? "").length, 6);
      const tag = ["h1", "h2", "h3", "h4", "h5", "h6"][level - 1] ?? "h6";
      art.appendChild(el(tag, {}, h?.[2] ?? ""));
    } else if (isHr(line)) {
      flush();
      art.appendChild(el("hr", {}));
    } else {
      buf.push(line);
    }
  }
  flush();
  return art;
}
