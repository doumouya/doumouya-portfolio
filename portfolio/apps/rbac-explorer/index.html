   scales every theme shares: spacing, radius, the shared mono family, the type
   scale, density rhythm, motion, breakpoints, and z-index. It carries NO
   color/palette/`--font`-family/`--shadow` *value* token — those are per-theme
   (the palette tier, in src/theme/themes/<name>.css under the two-axis selector).

   This file is the structure half of the old tokens.css :root block; the palette
   half moved into the per-theme files. base.css defines no .amu-* class — it is
   theme-tier, excluded from the audit's R4 ownership exactly as tokens.css was. */

:root {
  /* spacing scale */
  --sp-1: 0.25rem;
  --sp-2: 0.5rem;
  --sp-3: 0.75rem;
  --sp-4: 1rem;
  --sp-5: 1.5rem;
  --sp-6: 2rem;
  --sp-8: 3rem;

  /* radius (px on purpose — corners don't scale with font size) */
  --radius-sm: 7px;
  --radius: 10px;
  --radius-lg: 16px;
  --radius-pill: 999px;

     display/body `--font` is a PALETTE token (per theme, e.g. mono-first for
     portfolio); `--font-mono` is shared structure and stays here. */
  --font-mono: ui-monospace, "Cascadia Code", "Segoe UI Mono", Consolas, monospace;

  /* type scale */
  --text-xs: 0.75rem;
  --text-sm: 0.8125rem;
  --text-md: 0.9375rem;
  --text-lg: 1.125rem;
  --text-xl: 1.5rem;
  --text-2xl: 2.25rem;

  /* density rhythm — the Linear-calm knob set. Components consume these;
     density attrs retune them globally (one knob, not per-sheet). */
  --row-h: 2.25rem;      /* 36px table/list rows */
  --ctl-h: 2rem;         /* 32px controls (buttons, inputs) */
  --pad-x: 0.75rem;      /* horizontal cell/control padding */
  --gap: 0.5rem;         /* default flex/grid gap */
  --topbar-h: 3.25rem;   /* 52px */
  --rail-w: 15rem;       /* 240px, fixed — no icon-only collapse */

  /* motion */
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --fast: 0.12s;
  --slow: 0.22s;

  /* z-index scale — the stacking contract (overlays above chrome above content) */
  --z-base: 0;
  --z-rail: 10;
  --z-topbar: 20;
  --z-side-panel: 30;
  --z-popover: 100;
  --z-toast: 200;
  --z-modal: 300;

  /* breakpoints — the documented source of truth. CSS can't var() inside a
     @media query, so each media rule repeats the rem literal and tags it with
     the matching token name in a comment to stay grep-synced. Floor = iPad Mini
     landscape (1024x768 = 64rem).
       --bp-lg 80rem (1280px): below, side panels overlay
       --bp-md 64rem (1024px): the FLOOR; below, the rail also drawers
       --bp-sm 48rem  (768px): portrait safety net (kept usable, not a target) */
  --bp-lg: 80rem;
  --bp-md: 64rem;
  --bp-sm: 48rem;
}
/* themes/portfolio.css — the portfolio (Console) theme (AC-9). Ports web-kit's
   "Datacore Console" identity into the amenan token contract for both modes:
   near-monochrome ink/paper, ONE green --signal, mono-first --font, a hard 1.5px
   --rule with a 4px offset block --rule-shadow, and FLAT base elevation (shadows
   only for floating layers). Values lifted from web-kit
   src/tokens/colors+charts+elevation+typography + the Console card offset block.

   web-kit keyed light off :root and dark off [data-theme="dark"]; amenan splits
   that into the two-axis [data-theme="portfolio"][data-mode="dark"|"light"].

   Token map (web-kit → amenan contract):
     ink/paper        → --bg / --text / --surface*
     --rule (ink)     → --rule (1.5px ink/paper structural line)
     --elev (ink)     → carried by --rule-shadow = 4px 4px 0 0 var(--rule)
     --accent (ink)   → --accent (primary actions are ink)
     --signal (green) → --signal / --ok / --status-progress / chart-1
     --shadow-popover/-dialog → web-kit elevation.css
     --font-sans (mono) → --font (mono-first)
     --chart-1..8     → web-kit charts.css
     --status-*       → web-kit workflow states */

/* ── dark — ink surface, paper text, green-400 signal ────────────────────── */
html[data-theme="portfolio"][data-mode="dark"] {
  --bg: #0B0B0C;                 /* --ink */
  --surface: #161618;            /* --gray-900 (surface-overlay tier) */
  --surface-2: #000000;          /* --surface-sunken */
  --border: #232327;             /* soft hairline (dividers, rows) */
  --text: #F2F2F3;
  --text-dim: #A1A1A6;           /* --gray-400 */
  --text-mute: #54545A;          /* --text-subtle (dark) */
  --accent: #F2F2F3;             /* accent = paper-ink in dark (primary actions) */
  --accent-soft: #232327;        /* --accent-tint (dark) */
  --on-accent: #0B0B0C;          /* --text-on-accent (dark) = ink */
  --ok: #34C77B;                 /* --green-400 (success in dark) */
  --warn: #B7791F;               /* --amber-500 */
  --info: #22d3ee;               /* cyan series — restrained info */
  --danger: #D63B3B;             /* --red-500 */
  --hover: color-mix(in srgb, #F2F2F3 6%, transparent);
  --glass: color-mix(in srgb, #F2F2F3 4%, transparent);
  --glass-blur: 0px;             /* Console is FLAT — no glass blur */
  --shadow: none;                /* base surfaces carry NO drop shadow */
  --ring: inset 0 0 0 1px var(--border);
  --font: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  color-scheme: dark;

  /* the Console vocabulary */
  --signal: #34C77B;             /* --green-400 */
  --signal-hover: #1E9E5A;       /* --green-500 */
  --signal-tint: color-mix(in srgb, #34C77B 16%, var(--surface));
  --rule: #F2F2F3;               /* HARD ink structural line (paper-ink in dark) */
  --rule-shadow: 4px 4px 0 0 var(--rule);  /* the Console card offset block shadow */
  --focus-ring: #34C77B;         /* --focus = green in dark */
  --chart-1: var(--signal);      /* brand green — default single series */
  --chart-2: #22d3ee;
  --chart-3: #a78bfa;
  --chart-4: #fbbf24;
  --chart-5: #f87171;
  --chart-6: #f472b6;
  --chart-7: #94a3b8;
  --chart-8: #2dd4bf;
  --status-backlog: #A1A1A6;     /* --gray-400 */
  --status-progress: #34C77B;    /* --green-400 */
  --status-review: #B7791F;      /* --amber-500 */
  --status-done: #34C77B;        /* --green-400 */
  --shadow-popover: 0 4px 12px -2px rgba(15, 23, 42, 0.12),
                    0 2px 4px -2px rgba(15, 23, 42, 0.08);
  --shadow-dialog: 0 16px 40px -8px rgba(15, 23, 42, 0.22),
                   0 4px 10px -4px rgba(15, 23, 42, 0.10);
}

/* ── light — paper surface, ink text, green-500 signal (web-kit :root) ─────── */
html[data-theme="portfolio"][data-mode="light"] {
  --bg: #FFFFFF;                 /* --paper */
  --surface: #FFFFFF;            /* --surface */
  --surface-2: #ECECEE;          /* --surface-sunken / --gray-100 */
  --border: #E0E0E3;             /* --gray-200 soft hairline */
  --text: #0B0B0C;              /* --ink */
  --text-dim: #717177;           /* --gray-500 */
  --text-mute: #A1A1A6;          /* --gray-400 */
  --accent: #0B0B0C;             /* accent = ink (primary actions) */
  --accent-soft: #ECECEE;        /* --accent-tint (--gray-100) */
  --on-accent: #FFFFFF;          /* --text-on-accent = paper */
  --ok: #1E9E5A;                 /* --green-500 (success in light) */
  --warn: #B7791F;               /* --amber-500 */
  --info: #0891b2;               /* cyan-600 — restrained info */
  --danger: #D63B3B;             /* --red-500 */
  --hover: color-mix(in srgb, #0B0B0C 4%, transparent);
  --glass: color-mix(in srgb, #FFFFFF 80%, transparent);
  --glass-blur: 0px;             /* Console is FLAT — no glass blur */
  --shadow: none;                /* base surfaces carry NO drop shadow */
  --ring: inset 0 0 0 1px var(--border);
  --font: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  color-scheme: light;

  /* the Console vocabulary */
  --signal: #1E9E5A;             /* --green-500 */
  --signal-hover: #16864B;       /* --green-600 */
  --signal-tint: color-mix(in srgb, #1E9E5A 12%, var(--surface));
  --rule: #0B0B0C;               /* HARD ink structural line */
  --rule-shadow: 4px 4px 0 0 var(--rule);  /* the Console card offset block shadow */
  --focus-ring: #1E9E5A;         /* --focus = green */
  --chart-1: var(--signal);      /* brand green — default single series */
  --chart-2: #0891b2;            /* cyan-600 */
  --chart-3: #7c3aed;            /* violet-600 */
  --chart-4: #B7791F;            /* amber */
  --chart-5: #dc2626;            /* red-600 */
  --chart-6: #db2777;            /* pink-600 */
  --chart-7: #475569;            /* slate-600 */
  --chart-8: #0e7490;            /* teal-700 */
  --status-backlog: #717177;     /* --gray-500 */
  --status-progress: #1E9E5A;    /* --signal */
  --status-review: #B7791F;      /* --amber-500 */
  --status-done: #1E9E5A;        /* --green-500 */
  --shadow-popover: 0 4px 12px -2px rgba(15, 23, 42, 0.12),
                    0 2px 4px -2px rgba(15, 23, 42, 0.08);

/* atoms — the lowest-level vocabulary: button, chip, input, textarea, badge,
   spinner, kbd. Sole owner of these classes (ui-fork-audit R4).
   knob: --atom-radius */

/* ── amu-btn ── the text button. Variants: default · accent (ONE per view —
   the primary action) · ghost (low-emphasis). */
.amu-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: calc(var(--gap) * 0.75);
  height: var(--ctl-h);
  padding: 0 var(--pad-x);
  border: 1px solid var(--border);
  border-radius: var(--atom-radius, var(--radius));
  background: var(--surface);
  color: var(--text);
  font-size: var(--text-sm);
  font-weight: 500;
  cursor: pointer;
  transition: background var(--fast) var(--ease), border-color var(--fast) var(--ease);
  user-select: none;
  white-space: nowrap;
}
.amu-btn:hover {
  background: var(--hover);
}
.amu-btn:disabled {
  opacity: 0.45;
  cursor: default;
}
.amu-btn--accent {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--on-accent);
  font-weight: 600;
}
.amu-btn--accent:hover {
  background: var(--accent);
  filter: brightness(1.08);
}
.amu-btn--ghost {
  border-color: transparent;
  background: transparent;
  color: var(--text-dim);
}
.amu-btn--ghost:hover {
  background: var(--hover);
  color: var(--text);
}
.amu-btn--danger {
  color: var(--danger);
}
.amu-btn--sm {
  height: 1.625rem;
  padding: 0 var(--sp-2);
  font-size: var(--text-xs);
}
/* icon-only: square, no horizontal padding; the bi glyph centers via the
   flex alignment already on .amu-btn. */
.amu-btn--icon {
  width: var(--ctl-h);
  padding: 0;
  font-size: var(--text-md);
}

/* ── amu-chip ── pill selector (single-select rows live in chip-row). */
.amu-chip {
  display: inline-flex;
  align-items: center;
  height: 1.625rem;
  padding: 0 var(--sp-3);
  border: 1px solid transparent;
  border-radius: var(--radius-pill);
  background: transparent;
  color: var(--text-dim);
  font-size: var(--text-sm);
  cursor: pointer;
  transition: background var(--fast) var(--ease), color var(--fast) var(--ease);
  white-space: nowrap;
}
.amu-chip:hover {
  color: var(--text);
}
.amu-chip.is-active {
  background: var(--surface);
  color: var(--text);
  box-shadow: var(--ring), var(--shadow);
}

/* ── amu-input ── single-line text input. */
.amu-input {
  height: var(--ctl-h);
  padding: 0 var(--pad-x);
  border: 1px solid var(--border);
  border-radius: var(--atom-radius, var(--radius));
  background: var(--bg);
  color: var(--text);
  font-size: var(--text-sm);
  width: 100%;
}
.amu-input::placeholder {
  color: var(--text-mute);
}
.amu-input:focus {
  outline: 2px solid var(--focus-ring);
  outline-offset: -1px;
  border-color: var(--accent);
}

/* ── amu-textarea ── the multiline input (comment composers, descriptions). */
.amu-textarea {
  display: block;
  width: 100%;
  min-height: 4.5rem;
  padding: 0.5rem var(--pad-x);
  border: 1px solid var(--border);
  border-radius: var(--atom-radius, var(--radius));
  background: var(--bg);
  color: var(--text);
  font: inherit;
  font-size: var(--text-sm);
  line-height: 1.5;
  resize: vertical;
}
.amu-textarea::placeholder {
  color: var(--text-mute);
}
.amu-textarea:focus {
  outline: 2px solid var(--focus-ring);
  outline-offset: -1px;
  border-color: var(--accent);
}

/* ── amu-badge ── soft-tint label pill (status / role / plan). */
.amu-badge {
  display: inline-flex;
  align-items: center;
  height: 1.25rem;
  padding: 0 var(--sp-2);
  border-radius: var(--radius-pill);
  background: var(--surface-2);
  color: var(--text-dim);
  font-size: var(--text-xs);
  font-weight: 500;
  white-space: nowrap;
}
.amu-badge--ok { background: var(--signal-tint); color: var(--signal); }
.amu-badge--warn { background: color-mix(in srgb, var(--warn) 14%, transparent); color: var(--warn); }
.amu-badge--danger { background: color-mix(in srgb, var(--danger) 14%, transparent); color: var(--danger); }
.amu-badge--info { background: color-mix(in srgb, var(--info) 14%, transparent); color: var(--info); }
.amu-badge--accent { background: var(--accent-soft); color: var(--accent); }

/* ── amu-spinner ── async feedback (used sparingly — optimistic UI first). */
.amu-spinner {
  display: inline-block;
  width: 1rem;
  height: 1rem;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: amu-spin 0.7s linear infinite;
}
@keyframes amu-spin {
  to { transform: rotate(360deg); }
}

/* ── amu-kbd ── keyboard hint. */
.amu-kbd {
  display: inline-block;
  padding: 0.0625rem 0.375rem;
  border: 1px solid var(--border);
  border-bottom-width: 2px;
  border-radius: var(--radius-sm);
  background: var(--surface);
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--text-dim);
}
/* select — native select, token-skinned (less is more: no custom listbox
   until a real need arrives). Sole owner of .amu-select. */

.amu-select {
  height: var(--ctl-h);
  padding: 0 var(--pad-x);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  color: var(--text);
  font-size: var(--text-sm);
  cursor: pointer;
  min-width: 9rem;
}

.amu-select:focus {
  outline: 2px solid var(--focus-ring);
  outline-offset: -1px;
  border-color: var(--accent);
}
/* stat — KPI tile + strip. Sole owner of .amu-stat*. */

.amu-stat-strip {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(10rem, 1fr));
  gap: var(--gap);
}

.amu-stat {
  padding: var(--sp-3) var(--sp-4);
  background: var(--surface);
  border: 1.5px solid var(--rule);
  border-radius: var(--radius);
}

.amu-stat-label {
  font-size: var(--text-xs);
  color: var(--text-mute);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.amu-stat-value {
  font-size: var(--text-xl);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.02em;
}

.amu-stat-value.is-ok { color: var(--signal); }
.amu-stat-value.is-warn { color: var(--warn); }
.amu-stat-value.is-danger { color: var(--danger); }

.amu-stat-sub {
  font-size: var(--text-xs);
  color: var(--text-dim);
}
/* rbac-explorer styles — authored on amenan-ui's token contract (the `portfolio`
   Console theme is selected on <html data-theme="portfolio">; chrome comes from
   amenan-ui components). Reach/success uses the one green --signal; structural
   dividers use the hard 1.5px ink --rule. */
body { margin: 0; font-family: var(--font); color: var(--text); background: var(--bg); }
.app-header { display: flex; gap: var(--sp-3); align-items: center; padding: var(--sp-3) var(--sp-4);
             border-bottom: 1.5px solid var(--rule); }
.app-header h1 { font-size: var(--text-lg); font-weight: 600; margin: 0; }
.muted { color: var(--text-dim); font-size: var(--text-sm); }
.spacer { flex: 1; }
.actor-field { display: flex; align-items: center; gap: var(--sp-2); font-size: var(--text-sm); color: var(--text-dim); }

.legend { display: flex; gap: var(--sp-4); flex-wrap: wrap; padding: var(--sp-3) var(--sp-4);
          font-size: var(--text-sm); color: var(--text-dim); border-bottom: 1.5px solid var(--rule); }
.legend b { color: var(--text); }
.legend .swatch { font-style: normal; font-weight: 400; }
.legend .sw-reached { color: var(--signal); }
.legend .sw-dim { opacity: 0.4; }
.legend .sw-member { box-shadow: inset 0 0 0 2px var(--accent); padding: 0 0.35rem; border-radius: var(--radius-sm); }

main { display: grid; grid-template-columns: 1fr 18rem; gap: var(--sp-4); padding: var(--sp-4); align-items: start; }
@media (max-width: 40rem) { main { grid-template-columns: 1fr; } }

#tree .children { margin-left: 1.4rem; border-left: 1px dashed var(--border); padding-left: var(--sp-4); }
.node { display: flex; justify-content: space-between; align-items: center; gap: var(--sp-2);
        border: 1px solid var(--border); border-radius: var(--radius); padding: var(--sp-2) var(--sp-3); margin: var(--sp-2) 0;
        cursor: pointer; background: var(--surface); transition: opacity 0.15s, border-color 0.15s, background 0.15s; }
.node:hover { border-color: var(--accent); }
.node.dim { opacity: 0.4; }
.node.reached { border-color: var(--signal); background: color-mix(in srgb, var(--signal) 14%, var(--surface)); }
.node.member { box-shadow: inset 0 0 0 2px var(--accent); }
.nlabel { font-weight: 600; }
.kind { font-weight: 400; color: var(--text-dim); font-size: var(--text-xs); margin-left: var(--sp-2); }
.badges { display: flex; gap: var(--sp-1); }

#panel { border: 1.5px solid var(--rule); border-radius: var(--radius); padding: var(--sp-4);
         background: var(--surface); position: sticky; top: var(--sp-4); }
#panel .amu-stat { margin-bottom: var(--sp-4); }
#panel p { margin: 0 0 var(--sp-3); font-size: var(--text-sm); }
#panel i { color: var(--text-dim); }

  var labelOf = (id) => NODES.find((n) => n.id === id)?.label ?? id;
  var childrenOf = (pid) => NODES.filter((n) => n.parent === pid);
  var membersAt = (id) => ACTORS.filter((a) => memberships[a].has(id));
  function nodeFrag(n, reach) {
    const frag = document.createDocumentFragment();
    const isMember = memberships[actor].has(n.id);
    const reached = reach.has(n.id);
    const cls = ["node", reached ? "reached" : "dim", isMember && "member"].filter(Boolean).join(" ");
    const memberBadges = membersAt(n.id).map((a) => {
      const b = badge({ label: a.slice(0, 1), tone: a === actor ? "accent" : void 0 });
      b.title = a;
      return b;
    });
    const row = el(
      "div",
      { class: cls, title: `click to ${isMember ? "revoke" : "grant"} ${actor}'s membership here` },
      el("span", { class: "nlabel" }, n.label, el("span", { class: "kind" }, n.kind)),
      el("span", { class: "badges" }, ...memberBadges)
    );
    row.addEventListener("click", () => {
      const set = memberships[actor];
      if (set.has(n.id)) set.delete(n.id);
      else set.add(n.id);
      render();
    });
    frag.append(row);
    const kids = childrenOf(n.id);
    if (kids.length) {
      const wrap = el("div", { class: "children" });
      kids.forEach((k) => wrap.append(nodeFrag(k, reach)));
      frag.append(wrap);
    }
    return frag;
  }
  function render() {
    const reach = new Set(graph.reachable([...memberships[actor]]));
    byId("tree").replaceChildren(...NODES.filter((n) => !n.parent).map((n) => nodeFrag(n, reach)));
    const reachable = NODES.filter((n) => reach.has(n.id));
    const memberOf = [...memberships[actor]];
    const panel = byId("panel");
    panel.replaceChildren();
    mountStat(panel, {
      label: "reachable nodes",
      value: `${reachable.length} / ${NODES.length}`,
      tone: "ok"
    });
    panel.append(
      el(
        "p",
        {},
        el("b", {}, actor),
        " is a member of:",
        el("br"),
        memberOf.length ? memberOf.map(labelOf).join(", ") : el("i", {}, "nothing")
      ),
      el(
        "p",
        {},
        "Reaches:",
        el("br"),
        reachable.length ? reachable.map((n) => labelOf(n.id)).join(", ") : el("i", {}, "nothing")
      )
    );
  }
  function buildChrome() {
    const actorField = el("label", { class: "actor-field" }, "Actor");
    mountSelect(actorField, {
      options: ACTORS.map((a) => ({ value: a, label: a })),
      value: actor,
      onChange: (v) => {
        actor = v;
        render();
      }
    });
    const header = el(
      "header",
      { class: "app-header" },
      el("h1", {}, "rbac-explorer"),
      el("span", { class: "muted" }, "scoped-ownership access, resolved in your browser"),
      el("span", { class: "spacer" }),
      actorField
    );
    const legend = el(
      "div",
      { class: "legend" },
      el("span", {}, el("b", { class: "swatch sw-reached" }, "\u25CF"), " reachable"),
      el("span", {}, el("b", { class: "swatch sw-member" }, "\u25A2"), " direct membership"),
      el("span", {}, el("b", { class: "swatch sw-dim" }, "\u25CF"), " no access"),
      el("span", {}, "Membership grants the node ", el("b", {}, "and everything beneath it"), " \u2014 never the parent."),
      el("span", {}, "Click any node to grant / revoke the selected actor's membership.")
    );
    const main = el("main", {}, el("section", { id: "tree" }), el("aside", { id: "panel" }));
    byId("root").append(header, legend, main);
  }
  window.addEventListener("DOMContentLoaded", async () => {
    await wasm_bindgen({ module_or_path: b64ToBytes(WASM_B64) });
    WasmGraph = wasm_bindgen.WasmGraph;
    graph = new WasmGraph(NODES.map((n) => n.id), NODES.map((n) => n.parent));
    buildChrome();
    render();
  });
})();
</script></body></html>
