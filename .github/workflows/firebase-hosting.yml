name: firebase-hosting

# Deploys the portfolio front-door (the portfolio/ subdir) to Firebase Hosting.
# - push to main  -> live channel (https://doumouya-portfolio.web.app + custom domain)
# - pull_request  -> ephemeral preview channel (URL printed in the job log)
#
# CI does NOT rebuild OR typecheck — both need the amenan-ui sibling (the landing is now
# authored on the amenan-ui package) plus the app-demo repos. The landing + app demos are
# committed pre-built and locally typechecked (npm run build / npm run typecheck against the
# sibling checkout); CI just stages the committed files into portfolio/dist via stage.sh and
# deploys. amenan-ui is a LOCAL build input, exactly like the demo repos are for the rebuild.
#
# Auth: the numu.im org blocks service-account keys
# (constraints/iam.disableServiceAccountKeyCreation), so this uses a user CI token instead of
# a service-account JSON. Generate it with `firebase login:ci` and store it as the repo secret
# FIREBASE_TOKEN (Settings -> Secrets and variables -> Actions).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: firebase-hosting-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portfolio
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portfolio/package-lock.json
      # No npm ci / typecheck here: the landing is authored on the amenan-ui sibling, which
      # isn't present in CI — it's built + typechecked locally before commit (see comment above).
      # CI only stages the committed, pre-built site and deploys it.
      - name: Stage the committed site into dist/
        run: sh tools/stage.sh
      # firebase.json lives at the repo root (public: portfolio/dist), so deploy from there.
      # Inputs are passed via env (never interpolated into the script) to avoid injection.
      - name: Deploy to Firebase Hosting
        working-directory: .
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            npx -y firebase-tools@latest deploy --only hosting \
              --project doumouya-portfolio --non-interactive
          else
            npx -y firebase-tools@latest hosting:channel:deploy "pr-$PR_NUMBER" \
              --project doumouya-portfolio --expires 7d --non-interactive
          fi
