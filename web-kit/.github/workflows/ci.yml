name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck (strict)
        run: npm run typecheck

      - name: Build the showcase (esbuild)
        run: npm run build

      - name: Test (device-class logic)
        run: npm test

      - name: Scrub — no source-project identity
        run: |
          if grep -rInE "redpash|rp-" src README.md 2>/dev/null; then
            echo "::error::forbidden identity token found"; exit 1
          fi
          echo "scrub clean"
